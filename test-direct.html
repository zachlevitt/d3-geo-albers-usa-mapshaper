<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test geoAlbersUsaMapshaper (Direct Import)</title>
  <script type="importmap">
    {
      "imports": {
        "d3-geo": "https://cdn.jsdelivr.net/npm/d3-geo@3/+esm",
        "d3-geo-polygon": "https://cdn.jsdelivr.net/npm/d3-geo-polygon@2/+esm"
      }
    }
  </script>
  <style>
    body { 
      margin: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .container {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 4px;
      max-width: 1000px;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      font-weight: 600;
    }
    svg { 
      display: block;
      border: 1px solid #eee;
      margin-top: 10px;
    }
    path.state {
      fill: #e0e0e0;
      stroke: #fff;
      stroke-width: 0.5;
    }
    path.state:hover {
      fill: #4a90e2;
    }
    .info {
      margin-top: 10px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 4px;
      font-size: 13px;
    }
    .code {
      font-family: Monaco, Consolas, monospace;
      background: #f0f0f0;
      padding: 2px 4px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <h1>geoAlbersUsaMapshaper Test</h1>
  <div class="container" id="container">
    <h2>geoAlbersUsaMapshaper - No vertical split</h2>
    <div class="info">
      <strong>Features:</strong>
      <ul>
        <li>Uses base geoAlbers for lower 48 (no split seam)</li>
        <li>Custom rotation, scale, and center for Alaska & Hawaii</li>
        <li>Click on the map to test <span class="code">invert()</span> function</li>
      </ul>
    </div>
    <svg id="map" width="1000" height="700"></svg>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://d3js.org/d3-geo.v4.min.js"></script>
  <script src="https://d3js.org/topojson.v3.min.js"></script>
  <script type="module">
    // Direct import from source
    import geoAlbersUsaMapshaper from './src/albersUsaMapshaper.js';
    
    const width = 1000;
    const height = 700;
    
    const svg = d3.select("#map");
    
    const projection = geoAlbersUsaMapshaper()
      .scale(1070)
      .translate([width / 2, height / 2]);
    
    const path = d3.geoPath(projection);
    
    // Load US TopoJSON data
    d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
      .then(us => {
        const states = topojson.feature(us, us.objects.states);
        
        svg.append("g")
          .selectAll("path")
          .data(states.features)
          .join("path")
          .attr("class", "state")
          .attr("d", path)
          .append("title")
          .text(d => d.properties.name);
        
        console.log("✓ Map loaded successfully!");
        console.log("✓ Projection scale:", projection.scale());
        console.log("✓ Projection translate:", projection.translate());
        console.log("Click on the map to test invert() function.");
        
        // Add click handler for testing invert
        svg.on("click", function(event) {
          const [x, y] = d3.pointer(event);
          const coords = projection.invert([x, y]);
          if (coords) {
            console.log(`Screen: [${x.toFixed(2)}, ${y.toFixed(2)}] -> Geographic: [${coords[0].toFixed(4)}°, ${coords[1].toFixed(4)}°]`);
            
            // Draw a small circle at the clicked point
            svg.append("circle")
              .attr("cx", x)
              .attr("cy", y)
              .attr("r", 4)
              .attr("fill", "red")
              .attr("stroke", "white")
              .attr("stroke-width", 1)
              .attr("opacity", 0.8)
              .transition()
              .duration(1000)
              .attr("opacity", 0)
              .remove();
          } else {
            console.log("Point outside projection bounds");
          }
        });
      })
      .catch(err => {
        console.error("Error loading map data:", err);
        d3.select("#container").append("p")
          .style("color", "red")
          .text("Error loading map data. Check console for details.");
      });
  </script>
</body>
</html>
