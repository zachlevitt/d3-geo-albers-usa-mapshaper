<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test d3-geo-albers-usa-mapshaper</title>
  <style>
    body { 
      margin: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .projection-test {
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 4px;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      font-weight: 600;
    }
    svg { 
      display: block;
      border: 1px solid #eee;
    }
    path.state {
      fill: #e0e0e0;
      stroke: #fff;
      stroke-width: 0.5;
    }
    path.state:hover {
      fill: #4a90e2;
    }
  </style>
</head>
<body>
  <h1>d3-geo-albers-usa-mapshaper Test</h1>
  <div class="container" id="container"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://d3js.org/topojson.v3.min.js"></script>
  <script type="module">
    import { geoAlbersUsaMapshaper } from './dist/index.mjs';
    
    const projections = [
      { name: 'geoAlbersUsaMapshaper', projection: geoAlbersUsaMapshaper }
    ];
    
    const width = 500;
    const height = 700;
    
    const container = d3.select("#container");
    
    // Load US TopoJSON data
    d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
      .then(us => {
        const states = topojson.feature(us, us.objects.states);
        
        projections.forEach(({ name, projection }) => {
          const div = container.append("div")
            .attr("class", "projection-test");
          
          div.append("h2").text(name);
          
          const svg = div.append("svg")
            .attr("width", width)
            .attr("height", height);
          
          const proj = projection()
            .scale(1070)
            .translate([width / 2, height / 2]);
          
          const path = d3.geoPath(proj);
          
          svg.append("g")
            .selectAll("path")
            .data(states.features)
            .join("path")
            .attr("class", "state")
            .attr("d", path)
            .append("title")
            .text(d => d.properties.name);
          
          // Add a point for testing invert
          svg.on("click", function(event) {
            const [x, y] = d3.pointer(event);
            const coords = proj.invert([x, y]);
            if (coords) {
              console.log(`${name} - Screen: [${x.toFixed(2)}, ${y.toFixed(2)}] -> Geographic: [${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}]`);
              
              // Draw a small circle at the clicked point
              svg.append("circle")
                .attr("cx", x)
                .attr("cy", y)
                .attr("r", 3)
                .attr("fill", "red")
                .attr("opacity", 0.8);
            }
          });
        });
        
        console.log("✓ Map loaded successfully!");
        console.log("Click on the maps to test the invert() function.");
      })
      .catch(err => {
        console.error("Error loading map data:", err);
        container.append("p")
          .style("color", "red")
          .text("Error loading map data. Check console for details.");
      });
  </script>
</body>
</html>
